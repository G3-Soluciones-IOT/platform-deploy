name: jameofit-local

x-local-postgres-pool: &local-postgres-pool
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${LOCAL_HIKARI_MAXIMUM_POOL_SIZE:-4}
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${LOCAL_HIKARI_MINIMUM_IDLE:-0}
  SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: ${LOCAL_HIKARI_CONNECTION_TIMEOUT_MS:-20000}
  SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: ${LOCAL_HIKARI_IDLE_TIMEOUT_MS:-30000}

services:
  # ==================================================
  # Platform services
  # ==================================================

  config-service:
    image: config-service:local
    container_name: config-service
    environment:
      SPRING_PROFILES_ACTIVE: ${CONFIG_SERVICE_SPRING_PROFILES_ACTIVE}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL}
      AUTH0_ISSUER_URI: ${AUTH0_ISSUER_URI}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      LEGACY_JWT_ENABLED: ${LEGACY_JWT_ENABLED}
      LEGACY_JWKS_ENABLED: ${LEGACY_JWKS_ENABLED}
      LEGACY_JWT_ISSUER: ${LEGACY_JWT_ISSUER}
      LEGACY_JWT_JWK_SET_URI: ${LEGACY_JWT_JWK_SET_URI}
    ports:
      - "${CONFIG_SERVICE_HOST_PORT}:8888"
    networks:
      - jameofit-network

  eureka-service:
    image: eureka-service:local
    container_name: eureka-service
    depends_on:
      - config-service
    environment:
      CONFIG_SERVER_URI: ${CONFIG_SERVER_URI}
    ports:
      - "${EUREKA_SERVICE_HOST_PORT}:8761"
    networks:
      - jameofit-network

  gateway-service:
    image: gateway-service:local
    container_name: gateway-service
    depends_on:
      - config-service
      - eureka-service
    environment:
      CONFIG_SERVER_URI: ${CONFIG_SERVER_URI}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL}
      AUTH0_ISSUER_URI: ${AUTH0_ISSUER_URI}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      LEGACY_JWT_ENABLED: ${LEGACY_JWT_ENABLED}
      LEGACY_JWT_ISSUER: ${LEGACY_JWT_ISSUER}
      LEGACY_JWT_JWK_SET_URI: ${LEGACY_JWT_JWK_SET_URI}
    ports:
      - "${GATEWAY_SERVICE_HOST_PORT}:8080"
    networks:
      - jameofit-network

  # ==================================================
  # Application services
  # ==================================================

  iam-service:
    image: iam-service:local
    container_name: iam-service
    depends_on:
      config-service:
        condition: service_started
      eureka-service:
        condition: service_started
    environment:
      <<: *local-postgres-pool
      CONFIG_SERVER_URI: ${CONFIG_SERVER_URI}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL}
      AUTH0_ISSUER_URI: ${AUTH0_ISSUER_URI}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      LEGACY_JWT_ENABLED: ${LEGACY_JWT_ENABLED}
      LEGACY_JWKS_ENABLED: ${LEGACY_JWKS_ENABLED}
      LEGACY_JWT_ISSUER: ${LEGACY_JWT_ISSUER}
      LEGACY_JWT_JWK_SET_URI: ${LEGACY_JWT_JWK_SET_URI}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-internal-service-secret-key}
      IAM_INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-internal-service-secret-key}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE}
      POSTGRES_HOST: ${LOCAL_POSTGRES_HOST}
      POSTGRES_PORT: ${LOCAL_POSTGRES_PORT}
      POSTGRES_DATABASE: ${IAM_SERVICE_DB_NAME}
      POSTGRES_USER: ${IAM_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${IAM_SERVICE_DB_PASSWORD}
    ports:
      - "${IAM_SERVICE_HOST_PORT}:8081"
    networks:
      - jameofit-network

  communication-service:
    image: communication-service:local
    container_name: communication-service
    depends_on:
      nutritionist-service:
        condition: service_started
      iam-service:
        condition: service_started
      config-service:
        condition: service_started
      eureka-service:
        condition: service_started
    environment:
      CONFIG_SERVER_URI: ${CONFIG_SERVER_URI}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL}
      AUTH0_ISSUER_URI: ${AUTH0_ISSUER_URI}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      LEGACY_JWT_ENABLED: ${LEGACY_JWT_ENABLED}
      LEGACY_JWT_ISSUER: ${LEGACY_JWT_ISSUER}
      LEGACY_JWT_JWK_SET_URI: ${LEGACY_JWT_JWK_SET_URI}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-internal-service-secret-key}
      MONGO_HOST: ${LOCAL_MONGO_HOST}
      MONGO_PORT: ${LOCAL_MONGO_PORT}
      MONGO_DATABASE: ${COMMUNICATION_SERVICE_MONGO_DATABASE}
      MONGO_USER: ${COMMUNICATION_SERVICE_MONGO_USER}
      MONGO_PASSWORD: ${COMMUNICATION_SERVICE_MONGO_PASSWORD}
      MONGO_AUTH_DB: ${COMMUNICATION_SERVICE_MONGO_AUTH_DB}
    ports:
      - "${COMMUNICATION_SERVICE_HOST_PORT}:8090"
    networks:
      - jameofit-network

  goals-service:
    image: goals-service:local
    container_name: goals-service
    depends_on:
      config-service:
        condition: service_started
      eureka-service:
        condition: service_started
    environment:
      <<: *local-postgres-pool
      CONFIG_SERVER_URI: ${CONFIG_SERVER_URI}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL}
      AUTH0_ISSUER_URI: ${AUTH0_ISSUER_URI}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      LEGACY_JWT_ENABLED: ${LEGACY_JWT_ENABLED}
      LEGACY_JWT_ISSUER: ${LEGACY_JWT_ISSUER}
      LEGACY_JWT_JWK_SET_URI: ${LEGACY_JWT_JWK_SET_URI}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE}
      POSTGRES_HOST: ${LOCAL_POSTGRES_HOST}
      POSTGRES_PORT: ${LOCAL_POSTGRES_PORT}
      POSTGRES_DATABASE: ${GOALS_SERVICE_DB_NAME}
      POSTGRES_USER: ${GOALS_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${GOALS_SERVICE_DB_PASSWORD}
    ports:
      - "${GOALS_SERVICE_HOST_PORT}:8083"
    networks:
      - jameofit-network

  meal-plans-service:
    image: meal-plans-service:local
    container_name: meal-plans-service
    depends_on:
      config-service:
        condition: service_started
      eureka-service:
        condition: service_started
    environment:
      <<: *local-postgres-pool
      CONFIG_SERVER_URI: ${CONFIG_SERVER_URI}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL}
      AUTH0_ISSUER_URI: ${AUTH0_ISSUER_URI}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      LEGACY_JWT_ENABLED: ${LEGACY_JWT_ENABLED}
      LEGACY_JWT_ISSUER: ${LEGACY_JWT_ISSUER}
      LEGACY_JWT_JWK_SET_URI: ${LEGACY_JWT_JWK_SET_URI}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE}
      POSTGRES_HOST: ${LOCAL_POSTGRES_HOST}
      POSTGRES_PORT: ${LOCAL_POSTGRES_PORT}
      POSTGRES_DATABASE: ${MEAL_PLANS_SERVICE_DB_NAME}
      POSTGRES_USER: ${MEAL_PLANS_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${MEAL_PLANS_SERVICE_DB_PASSWORD}
    ports:
      - "${MEAL_PLANS_SERVICE_HOST_PORT}:8084"
    networks:
      - jameofit-network

  payments-service:
    image: payments-service:local
    container_name: payments-service
    depends_on:
      config-service:
        condition: service_started
      eureka-service:
        condition: service_started
      iam-service:
        condition: service_started
    environment:
      <<: *local-postgres-pool
      CONFIG_SERVER_URI: ${CONFIG_SERVER_URI}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL}
      AUTH0_ISSUER_URI: ${AUTH0_ISSUER_URI}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      LEGACY_JWT_ENABLED: ${LEGACY_JWT_ENABLED}
      LEGACY_JWT_ISSUER: ${LEGACY_JWT_ISSUER}
      LEGACY_JWT_JWK_SET_URI: ${LEGACY_JWT_JWK_SET_URI}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-internal-service-secret-key}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      POSTGRES_HOST: ${LOCAL_POSTGRES_HOST}
      POSTGRES_PORT: ${LOCAL_POSTGRES_PORT}
      POSTGRES_DATABASE: ${PAYMENTS_SERVICE_DB_NAME}
      POSTGRES_USER: ${PAYMENTS_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${PAYMENTS_SERVICE_DB_PASSWORD}
    ports:
      - "${PAYMENTS_SERVICE_HOST_PORT}:8092"
    networks:
      - jameofit-network

  nutritionist-service:
    image: nutritionist-service:local
    container_name: nutritionist-service
    depends_on:
      config-service:
        condition: service_started
      eureka-service:
        condition: service_started
      iam-service:
        condition: service_started
    environment:
      <<: *local-postgres-pool
      CONFIG_SERVER_URI: ${CONFIG_SERVER_URI}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL}
      AUTH0_ISSUER_URI: ${AUTH0_ISSUER_URI}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      LEGACY_JWT_ENABLED: ${LEGACY_JWT_ENABLED}
      LEGACY_JWT_ISSUER: ${LEGACY_JWT_ISSUER}
      LEGACY_JWT_JWK_SET_URI: ${LEGACY_JWT_JWK_SET_URI}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-internal-service-secret-key}
      POSTGRES_HOST: ${LOCAL_POSTGRES_HOST}
      POSTGRES_PORT: ${LOCAL_POSTGRES_PORT}
      POSTGRES_DATABASE: ${NUTRITIONIST_SERVICE_DB_NAME}
      POSTGRES_USER: ${NUTRITIONIST_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${NUTRITIONIST_SERVICE_DB_PASSWORD}
    ports:
      - "${NUTRITIONIST_SERVICE_HOST_PORT}:8085"
    networks:
      - jameofit-network

  profiles-service:
    image: profiles-service:local
    container_name: profiles-service
    depends_on:
      config-service:
        condition: service_started
      eureka-service:
        condition: service_started
    environment:
      <<: *local-postgres-pool
      CONFIG_SERVER_URI: ${CONFIG_SERVER_URI}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL}
      AUTH0_ISSUER_URI: ${AUTH0_ISSUER_URI}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      LEGACY_JWT_ENABLED: ${LEGACY_JWT_ENABLED}
      LEGACY_JWT_ISSUER: ${LEGACY_JWT_ISSUER}
      LEGACY_JWT_JWK_SET_URI: ${LEGACY_JWT_JWK_SET_URI}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-internal-service-secret-key}
      POSTGRES_HOST: ${LOCAL_POSTGRES_HOST}
      POSTGRES_PORT: ${LOCAL_POSTGRES_PORT}
      POSTGRES_DATABASE: ${PROFILES_SERVICE_DB_NAME}
      POSTGRES_USER: ${PROFILES_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${PROFILES_SERVICE_DB_PASSWORD}
    ports:
      - "${PROFILES_SERVICE_HOST_PORT}:8086"
    networks:
      - jameofit-network

  recipes-service:
    image: recipes-service:local
    container_name: recipes-service
    depends_on:
      config-service:
        condition: service_started
      eureka-service:
        condition: service_started
    environment:
      <<: *local-postgres-pool
      CONFIG_SERVER_URI: ${CONFIG_SERVER_URI}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL}
      AUTH0_ISSUER_URI: ${AUTH0_ISSUER_URI}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      LEGACY_JWT_ENABLED: ${LEGACY_JWT_ENABLED}
      LEGACY_JWT_ISSUER: ${LEGACY_JWT_ISSUER}
      LEGACY_JWT_JWK_SET_URI: ${LEGACY_JWT_JWK_SET_URI}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE}
      POSTGRES_HOST: ${LOCAL_POSTGRES_HOST}
      POSTGRES_PORT: ${LOCAL_POSTGRES_PORT}
      POSTGRES_DATABASE: ${RECIPES_SERVICE_DB_NAME}
      POSTGRES_USER: ${RECIPES_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${RECIPES_SERVICE_DB_PASSWORD}
    ports:
      - "${RECIPES_SERVICE_HOST_PORT}:8087"
    networks:
      - jameofit-network

  tracking-service:
    image: tracking-service:local
    container_name: tracking-service
    depends_on:
      config-service:
        condition: service_started
      eureka-service:
        condition: service_started
    environment:
      <<: *local-postgres-pool
      CONFIG_SERVER_URI: ${CONFIG_SERVER_URI}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL}
      AUTH0_ISSUER_URI: ${AUTH0_ISSUER_URI}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      LEGACY_JWT_ENABLED: ${LEGACY_JWT_ENABLED}
      LEGACY_JWT_ISSUER: ${LEGACY_JWT_ISSUER}
      LEGACY_JWT_JWK_SET_URI: ${LEGACY_JWT_JWK_SET_URI}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE}
      POSTGRES_HOST: ${LOCAL_POSTGRES_HOST}
      POSTGRES_PORT: ${LOCAL_POSTGRES_PORT}
      POSTGRES_DATABASE: ${TRACKING_SERVICE_DB_NAME}
      POSTGRES_USER: ${TRACKING_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${TRACKING_SERVICE_DB_PASSWORD}
    ports:
      - "${TRACKING_SERVICE_HOST_PORT}:8089"
    networks:
      - jameofit-network

  iot-service:
    image: iot-service:local
    container_name: iot-service
    depends_on:
      config-service:
        condition: service_started
      eureka-service:
        condition: service_started
      iam-service:
        condition: service_started
    environment:
      <<: *local-postgres-pool
      CONFIG_SERVER_URI: ${CONFIG_SERVER_URI}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL}
      AUTH0_ISSUER_URI: ${AUTH0_ISSUER_URI}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      LEGACY_JWT_ENABLED: ${LEGACY_JWT_ENABLED}
      LEGACY_JWT_ISSUER: ${LEGACY_JWT_ISSUER}
      LEGACY_JWT_JWK_SET_URI: ${LEGACY_JWT_JWK_SET_URI}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE}
      POSTGRES_HOST: ${LOCAL_POSTGRES_HOST}
      POSTGRES_PORT: ${LOCAL_POSTGRES_PORT}
      POSTGRES_DATABASE: ${IOT_SERVICE_DB_NAME}
      POSTGRES_USER: ${IOT_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${IOT_SERVICE_DB_PASSWORD}
      IOT_API_KEY_SALT: ${IOT_API_KEY_SALT:-12}
      IOT_DEVICE_MAX_PER_USER: ${IOT_DEVICE_MAX_PER_USER:-5}
    ports:
      - "${IOT_SERVICE_HOST_PORT}:8093"
    networks:
      - jameofit-network

  nutrition-ai-service:
    image: nutrition-ai-service:local
    container_name: nutrition-ai-service
    depends_on:
      config-service:
        condition: service_started
      eureka-service:
        condition: service_started
      iam-service:
        condition: service_started
      goals-service:
        condition: service_started
      profiles-service:
        condition: service_started
      tracking-service:
        condition: service_started
    environment:
      <<: *local-postgres-pool
      CONFIG_SERVER_URI: ${CONFIG_SERVER_URI}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL}
      AUTH0_ISSUER_URI: ${AUTH0_ISSUER_URI}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      LEGACY_JWT_ENABLED: ${LEGACY_JWT_ENABLED}
      LEGACY_JWT_ISSUER: ${LEGACY_JWT_ISSUER}
      LEGACY_JWT_JWK_SET_URI: ${LEGACY_JWT_JWK_SET_URI}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE}
      NUTRITION_AI_DB_HOST: ${LOCAL_POSTGRES_HOST}
      NUTRITION_AI_DB_PORT: ${LOCAL_POSTGRES_PORT}
      NUTRITION_AI_DB_NAME: ${NUTRITION_AI_DB_NAME}
      NUTRITION_AI_DB_USER: ${NUTRITION_AI_DB_USER}
      NUTRITION_AI_DB_PASSWORD: ${NUTRITION_AI_DB_PASSWORD}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-local-jameofit}
      GCP_LOCATION: ${GCP_LOCATION:-us-central1}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      NUTRITION_AI_INTERNAL_TOKEN: ${NUTRITION_AI_INTERNAL_TOKEN:-internal-service-secret-key}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-internal-service-secret-key}
    ports:
      - "${NUTRITION_AI_SERVICE_HOST_PORT}:8091"
    networks:
      - jameofit-network

networks:
  jameofit-network:
    external: true
