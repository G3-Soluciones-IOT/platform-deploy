name: jameofit-gcp

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - jameofit-network

x-spring-service-environment: &spring-service-environment
  SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
  CONFIG_SERVER_URI: ${CONFIG_SERVER_URI}
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
  AUTH0_ISSUER_URI: ${AUTH0_ISSUER_URI}
  AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
  LEGACY_JWT_ENABLED: ${LEGACY_JWT_ENABLED}
  LEGACY_JWKS_ENABLED: ${LEGACY_JWKS_ENABLED}
  LEGACY_JWT_ISSUER: ${LEGACY_JWT_ISSUER}
  LEGACY_JWT_JWK_SET_URI: ${LEGACY_JWT_JWK_SET_URI}
  PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-https://jameofit.duckdns.org}
  SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED:-true}
  SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:-true}

x-iam-datasource: &iam-datasource
  SPRING_DATASOURCE_URL: ${IAM_SPRING_DATASOURCE_URL}
  SPRING_DATASOURCE_USERNAME: ${IAM_SPRING_DATASOURCE_USERNAME}
  SPRING_DATASOURCE_PASSWORD: ${IAM_SPRING_DATASOURCE_PASSWORD}

x-goals-datasource: &goals-datasource
  SPRING_DATASOURCE_URL: ${GOALS_SPRING_DATASOURCE_URL}
  SPRING_DATASOURCE_USERNAME: ${GOALS_SPRING_DATASOURCE_USERNAME}
  SPRING_DATASOURCE_PASSWORD: ${GOALS_SPRING_DATASOURCE_PASSWORD}

x-meal-plans-datasource: &meal-plans-datasource
  SPRING_DATASOURCE_URL: ${MEAL_PLANS_SPRING_DATASOURCE_URL}
  SPRING_DATASOURCE_USERNAME: ${MEAL_PLANS_SPRING_DATASOURCE_USERNAME}
  SPRING_DATASOURCE_PASSWORD: ${MEAL_PLANS_SPRING_DATASOURCE_PASSWORD}

x-payments-datasource: &payments-datasource
  SPRING_DATASOURCE_URL: ${PAYMENTS_SPRING_DATASOURCE_URL}
  SPRING_DATASOURCE_USERNAME: ${PAYMENTS_SPRING_DATASOURCE_USERNAME}
  SPRING_DATASOURCE_PASSWORD: ${PAYMENTS_SPRING_DATASOURCE_PASSWORD}

x-nutritionist-datasource: &nutritionist-datasource
  SPRING_DATASOURCE_URL: ${NUTRITIONIST_SPRING_DATASOURCE_URL}
  SPRING_DATASOURCE_USERNAME: ${NUTRITIONIST_SPRING_DATASOURCE_USERNAME}
  SPRING_DATASOURCE_PASSWORD: ${NUTRITIONIST_SPRING_DATASOURCE_PASSWORD}

x-profiles-datasource: &profiles-datasource
  SPRING_DATASOURCE_URL: ${PROFILES_SPRING_DATASOURCE_URL}
  SPRING_DATASOURCE_USERNAME: ${PROFILES_SPRING_DATASOURCE_USERNAME}
  SPRING_DATASOURCE_PASSWORD: ${PROFILES_SPRING_DATASOURCE_PASSWORD}

x-recipes-datasource: &recipes-datasource
  SPRING_DATASOURCE_URL: ${RECIPES_SPRING_DATASOURCE_URL}
  SPRING_DATASOURCE_USERNAME: ${RECIPES_SPRING_DATASOURCE_USERNAME}
  SPRING_DATASOURCE_PASSWORD: ${RECIPES_SPRING_DATASOURCE_PASSWORD}

x-tracking-datasource: &tracking-datasource
  SPRING_DATASOURCE_URL: ${TRACKING_SPRING_DATASOURCE_URL}
  SPRING_DATASOURCE_USERNAME: ${TRACKING_SPRING_DATASOURCE_USERNAME}
  SPRING_DATASOURCE_PASSWORD: ${TRACKING_SPRING_DATASOURCE_PASSWORD}

x-iot-datasource: &iot-datasource
  SPRING_DATASOURCE_URL: ${IOT_SPRING_DATASOURCE_URL}
  SPRING_DATASOURCE_USERNAME: ${IOT_SPRING_DATASOURCE_USERNAME}
  SPRING_DATASOURCE_PASSWORD: ${IOT_SPRING_DATASOURCE_PASSWORD}

x-nutrition-ai-datasource: &nutrition-ai-datasource
  SPRING_DATASOURCE_URL: ${NUTRITION_AI_SPRING_DATASOURCE_URL}
  SPRING_DATASOURCE_USERNAME: ${NUTRITION_AI_SPRING_DATASOURCE_USERNAME}
  SPRING_DATASOURCE_PASSWORD: ${NUTRITION_AI_SPRING_DATASOURCE_PASSWORD}

services:
  config-service:
    <<: *service-defaults
    image: ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/config-service:${CONFIG_SERVICE_IMAGE_TAG:?CONFIG_SERVICE_IMAGE_TAG is required}
    environment:
      SPRING_PROFILES_ACTIVE: ${CONFIG_SERVICE_SPRING_PROFILES_ACTIVE}
      AUTH0_ISSUER_URI: ${AUTH0_ISSUER_URI}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      LEGACY_JWT_ENABLED: ${LEGACY_JWT_ENABLED}
      LEGACY_JWKS_ENABLED: ${LEGACY_JWKS_ENABLED}
      LEGACY_JWT_ISSUER: ${LEGACY_JWT_ISSUER}
      LEGACY_JWT_JWK_SET_URI: ${LEGACY_JWT_JWK_SET_URI}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-https://jameofit.duckdns.org}
    ports:
      - "127.0.0.1:${CONFIG_SERVICE_PORT}:8888"

  eureka-service:
    <<: *service-defaults
    image: ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/eureka-service:${EUREKA_SERVICE_IMAGE_TAG:?EUREKA_SERVICE_IMAGE_TAG is required}
    depends_on:
      - config-service
    environment:
      <<: *spring-service-environment
    ports:
      - "127.0.0.1:${EUREKA_SERVICE_PORT}:8761"

  iam-service:
    <<: *service-defaults
    image: ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/iam-service:${IAM_SERVICE_IMAGE_TAG:?IAM_SERVICE_IMAGE_TAG is required}
    depends_on:
      - config-service
      - eureka-service
    environment:
      <<: [*spring-service-environment, *iam-datasource]
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-internal-service-secret-key}
      IAM_INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-internal-service-secret-key}

  goals-service:
    <<: *service-defaults
    image: ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/goals-service:${GOALS_SERVICE_IMAGE_TAG:?GOALS_SERVICE_IMAGE_TAG is required}
    depends_on:
      - config-service
      - eureka-service
      - iam-service
    environment:
      <<: [*spring-service-environment, *goals-datasource]

  meal-plans-service:
    <<: *service-defaults
    image: ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/meal-plans-service:${MEAL_PLANS_SERVICE_IMAGE_TAG:?MEAL_PLANS_SERVICE_IMAGE_TAG is required}
    depends_on:
      - config-service
      - eureka-service
      - iam-service
    environment:
      <<: [*spring-service-environment, *meal-plans-datasource]

  payments-service:
    <<: *service-defaults
    image: ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/payments-service:${PAYMENTS_SERVICE_IMAGE_TAG:?PAYMENTS_SERVICE_IMAGE_TAG is required}
    depends_on:
      - config-service
      - eureka-service
      - iam-service
    environment:
      <<: [*spring-service-environment, *payments-datasource]
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-internal-service-secret-key}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}

  nutritionist-service:
    <<: *service-defaults
    image: ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/nutritionist-service:${NUTRITIONIST_SERVICE_IMAGE_TAG:?NUTRITIONIST_SERVICE_IMAGE_TAG is required}
    depends_on:
      - config-service
      - eureka-service
      - iam-service
    environment:
      <<: [*spring-service-environment, *nutritionist-datasource]
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-internal-service-secret-key}

  profiles-service:
    <<: *service-defaults
    image: ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/profiles-service:${PROFILES_SERVICE_IMAGE_TAG:?PROFILES_SERVICE_IMAGE_TAG is required}
    depends_on:
      - config-service
      - eureka-service
      - iam-service
    environment:
      <<: [*spring-service-environment, *profiles-datasource]
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-internal-service-secret-key}

  recipes-service:
    <<: *service-defaults
    image: ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/recipes-service:${RECIPES_SERVICE_IMAGE_TAG:?RECIPES_SERVICE_IMAGE_TAG is required}
    depends_on:
      - config-service
      - eureka-service
      - iam-service
    environment:
      <<: [*spring-service-environment, *recipes-datasource]

  tracking-service:
    <<: *service-defaults
    image: ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/tracking-service:${TRACKING_SERVICE_IMAGE_TAG:?TRACKING_SERVICE_IMAGE_TAG is required}
    depends_on:
      - config-service
      - eureka-service
      - iam-service
    environment:
      <<: [*spring-service-environment, *tracking-datasource]

  iot-service:
    <<: *service-defaults
    image: ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/iot-service:${IOT_SERVICE_IMAGE_TAG:?IOT_SERVICE_IMAGE_TAG is required}
    depends_on:
      - config-service
      - eureka-service
      - iam-service
    environment:
      <<: [*spring-service-environment, *iot-datasource]

  nutrition-ai-service:
    <<: *service-defaults
    image: ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/nutrition-ai-service:${NUTRITION_AI_SERVICE_IMAGE_TAG:?NUTRITION_AI_SERVICE_IMAGE_TAG is required}
    depends_on:
      - config-service
      - eureka-service
      - iam-service
      - goals-service
      - profiles-service
      - tracking-service
    environment:
      <<: [*spring-service-environment, *nutrition-ai-datasource]
      GCP_LOCATION: ${GCP_LOCATION:-us-central1}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      NUTRITION_AI_INTERNAL_TOKEN: ${NUTRITION_AI_INTERNAL_TOKEN:-internal-service-secret-key}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-internal-service-secret-key}

  communication-service:
    <<: *service-defaults
    profiles: ["communication"]
    image: ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/communication-service:${COMMUNICATION_SERVICE_IMAGE_TAG:-sha-0000000}
    depends_on:
      - config-service
      - eureka-service
      - iam-service
      - nutritionist-service
    environment:
      <<: *spring-service-environment
      SPRING_MONGODB_URI: ${COMMUNICATION_MONGODB_URI:-}

  gateway-service:
    <<: *service-defaults
    image: ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/gateway-service:${GATEWAY_SERVICE_IMAGE_TAG:?GATEWAY_SERVICE_IMAGE_TAG is required}
    depends_on:
      - config-service
      - eureka-service
      - iam-service
      - goals-service
      - meal-plans-service
      - payments-service
      - nutritionist-service
      - profiles-service
      - recipes-service
      - tracking-service
      - iot-service
      - nutrition-ai-service
    environment:
      <<: *spring-service-environment
    ports:
      - "${GATEWAY_BIND_ADDRESS}:${GATEWAY_SERVICE_PORT}:8080"

networks:
  jameofit-network:
    driver: bridge
